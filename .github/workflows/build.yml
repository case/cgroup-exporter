on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  release:
    types: [released]
jobs:
  build:
    strategy:
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
      - run: nix run --inputs-from . nixpkgs#skopeo -- login ghcr.io --username "$GITHUB_ACTOR" --password "$GITHUB_TOKEN"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - if: github.event_name == 'release'
        run: echo "DO_TAG=1" >> "$GITHUB_ENV"
      - run: nix run .#push-container "ghcr.io/$GITHUB_REPOSITORY")"



