on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  build:
    strategy:
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm64
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        run: nix run .#push-container
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
